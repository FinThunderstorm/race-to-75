x-backend-service: &backend-service
  build:
    context: .
    dockerfile: backend/Dockerfile
    args:
      NODE_VERSION: ${NODE_VERSION:-24.16.0}
  image: race-to-75-backend:${SOURCE_COMMIT:-latest}

services:
  postgres:
    image: postgres:${POSTGRES_VERSION:-18}-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-race_to_75}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?}
      POSTGRES_USER: ${POSTGRES_USER:-race_to_75}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql

  migrate:
    <<: *backend-service
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:?}
    command: npm run db:migrate
    restart: "no"

  backend:
    <<: *backend-service
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:?}
      HOST: 0.0.0.0
      PORT: 7500
    expose:
      - "7500"

volumes:
  postgres-data:

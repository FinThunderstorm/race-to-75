x-backend-service: &backend-service
  image: ghcr.io/finthunderstorm/race-to-75:${IMAGE_TAG:-latest}

x-backend-environment: &backend-environment
  APP_HOST: ${APP_HOST:-race-to-75.rigster.cv}
  DATABASE_URL: ${DATABASE_URL:?}
  WITHINGS_API_BASE_URL: ${WITHINGS_API_BASE_URL:-https://wbsapi.withings.net}
  WITHINGS_AUTHORIZE_URL: ${WITHINGS_AUTHORIZE_URL:-https://account.withings.com/oauth2_user/authorize2}
  WITHINGS_BOOTSTRAP_DISPLAY_NAME: ${WITHINGS_BOOTSTRAP_DISPLAY_NAME:-}
  WITHINGS_BOOTSTRAP_EMAIL: ${WITHINGS_BOOTSTRAP_EMAIL:-}
  WITHINGS_BOOTSTRAP_ROLE: ${WITHINGS_BOOTSTRAP_ROLE:-admin}
  WITHINGS_CLIENT_ID: ${WITHINGS_CLIENT_ID:-}
  WITHINGS_CLIENT_SECRET: ${WITHINGS_CLIENT_SECRET:-}
  WITHINGS_CONNECT_TOKEN: ${WITHINGS_CONNECT_TOKEN:-}
  WITHINGS_INITIAL_SYNC_DAYS: ${WITHINGS_INITIAL_SYNC_DAYS:-3650}
  WITHINGS_REDIRECT_URI: ${WITHINGS_REDIRECT_URI:-}
  WITHINGS_WEBHOOK_CALLBACK_URL: ${WITHINGS_WEBHOOK_CALLBACK_URL:-}
  WITHINGS_WORKER_INTERVAL_SECONDS: ${WITHINGS_WORKER_INTERVAL_SECONDS:-60}

services:
  postgres:
    image: postgres:${POSTGRES_VERSION:-18}-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-race_to_75}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?}
      POSTGRES_USER: ${POSTGRES_USER:-race_to_75}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql

  migrate:
    <<: *backend-service
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *backend-environment
    command: npm run db:migrate
    restart: "no"

  backend:
    <<: *backend-service
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    environment:
      <<: *backend-environment
      HOST: 0.0.0.0
      PORT: 7500
    expose:
      - "7500"
    labels:
      - traefik.enable=true
      - traefik.http.middlewares.race-to-75-redirect-to-https.redirectscheme.scheme=https
      - traefik.http.routers.race-to-75-http.entryPoints=http
      - traefik.http.routers.race-to-75-http.middlewares=race-to-75-redirect-to-https
      - traefik.http.routers.race-to-75-http.rule=Host(`${APP_HOST:-race-to-75.rigster.cv}`) && PathPrefix(`/`)
      - traefik.http.routers.race-to-75-http.service=race-to-75
      - traefik.http.routers.race-to-75-https.entryPoints=https
      - traefik.http.routers.race-to-75-https.rule=Host(`${APP_HOST:-race-to-75.rigster.cv}`) && PathPrefix(`/`)
      - traefik.http.routers.race-to-75-https.service=race-to-75
      - traefik.http.routers.race-to-75-https.tls=true
      - traefik.http.routers.race-to-75-https.tls.certresolver=letsencrypt
      - traefik.http.services.race-to-75.loadbalancer.server.port=7500

  withings-worker:
    <<: *backend-service
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    environment:
      <<: *backend-environment
    command: >
      sh -c "while true; do
        npm run cron:fetch-withings-measurement;
        sleep \"$${WITHINGS_WORKER_INTERVAL_SECONDS}\";
      done"

volumes:
  postgres-data:

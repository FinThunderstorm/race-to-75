name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: finthunderstorm/race-to-75

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.2.0

      - run: ./deploy-scripts/01-lint.sh
      - run: ./deploy-scripts/02-build.sh
      - run: ./deploy-scripts/03-scan-image.sh
      - run: ./deploy-scripts/04-run-tests.sh

      - name: Registry login
        if: github.ref == 'refs/heads/master'
        uses: docker/login-action@v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - run: ./deploy-scripts/05-push-image.sh
        if: github.ref == 'refs/heads/master'

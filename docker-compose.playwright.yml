services:
  postgres:
    image: postgres:${POSTGRES_VERSION}-alpine
    environment:
      POSTGRES_DB: race_to_75
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d race_to_75"]
      interval: 2s
      timeout: 3s
      retries: 30

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        NODE_VERSION: ${NODE_VERSION}
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/race_to_75
    command: sh -c "npm run db:migrate && npm run start"

  playwright:
    image: mcr.microsoft.com/playwright:v${PLAYWRIGHT_VERSION}-noble
    depends_on:
      backend:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/race_to_75
      PLAYWRIGHT_BASE_URL: http://backend:7500
    working_dir: /work
    volumes:
      - .:/work
      - /work/node_modules
    command: sh -c "npm ci && npm test -w playwright"

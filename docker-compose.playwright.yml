services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        NODE_VERSION: ${NODE_VERSION}

  playwright:
    image: mcr.microsoft.com/playwright:v${PLAYWRIGHT_VERSION}-noble
    depends_on:
      backend:
        condition: service_healthy
    environment:
      PLAYWRIGHT_BASE_URL: http://backend:7200
    working_dir: /work
    volumes:
      - .:/work
      - /work/node_modules
    command: sh -c "npm ci && npm test -w playwright"
